name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Verify build
        run: npm run build

      # The compiled tools/*.js outputs are checked into git so GitHub Pages
      # can serve them statically. This step catches the case where someone
      # edited a tools/*.tsx source but forgot to run `npm run build`, which
      # would otherwise ship stale compiled JS to production.
      - name: Verify compiled tsx sources are in sync
        run: git diff --exit-code tools/
