name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Vendored React / ReactDOM are SRI-pinned in every tools/*.html via
      # scripts/vendor-sri.js (security audit 02-05-2026, Tier B #4). This
      # step fails CI if a vendor/* update landed without re-running the
      # script — the alternative would be a silent supply-chain regression
      # where a backdoored React ships and the integrity attribute goes
      # stale, which the browser would then refuse to execute.
      - name: Verify vendor SRI hashes
        run: npm run lint:sri

      - name: Run tests
        run: npm test 2>&1 | tee test-output.log && exit ${PIPESTATUS[0]}

      # CLAUDE.md requires the "N internal tests" badge in index.html to stay
      # in lockstep with the canonical sum of the per-suite "X/X passed" lines
      # that `npm test` prints. This step diffs the badge against that sum and
      # fails CI on drift so the two can't silently desync.
      - name: Verify landing-page test-count badge
        run: |
          actual=$(grep -E "^\s*[0-9]+/[0-9]+ passed" test-output.log | awk '{split($1,a,"/"); t+=a[1]} END{print t}')
          claimed=$(grep -oE "[0-9]+ internal tests" index.html | head -1 | grep -oE "^[0-9]+")
          echo "Canonical test count  : $actual"
          echo "index.html badge claim: $claimed"
          if [ "$actual" != "$claimed" ]; then
            echo "::error file=index.html::Test-count drift: $actual tests ran but index.html claims $claimed. Update the badge and the CHANGELOG together."
            exit 1
          fi

      # Fuzz harnesses at default cadence (FUZZ_N=1000, 2-loop). Total wall
      # time is ~5 s on GitHub's ubuntu-latest runner, so cheap enough to gate
      # every PR. CLAUDE.md's release bar is the heavier 10k × {seed 1, 42,
      # 999} sweep, which runs in a separate workflow below (fuzz-release.yml).
      # `FUZZ_QUIET=1` suppresses per-iteration output and only logs the final
      # summary; a non-zero exit from any harness propagates via set -e.
      - name: Fuzz (default cadence, every PR)
        env:
          FUZZ_QUIET: "1"
        run: |
          set -e
          for t in heatmap boxplot scatter aequorin lineplot venn upset; do
            npm run --silent fuzz:$t
          done

      - name: Verify build
        run: npm run build

      # The compiled tools/*.js outputs are checked into git so GitHub Pages
      # can serve them statically. This step catches the case where someone
      # edited a tools/*.tsx source but forgot to run `npm run build`, which
      # would otherwise ship stale compiled JS to production.
      #
      # tools/version.js is excluded because it is generated from `git describe`
      # rather than from TSX source — CI's shallow checkout has no tags and so
      # would always regenerate it as "dev", producing a spurious drift.
      - name: Verify compiled tsx sources are in sync
        run: git diff --exit-code -- tools/ ':(exclude)tools/version.js'
