<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Temporary phase-3 verification page for the SPA migration.
      Loads the same vendor + shared.bundle pair every tool HTML
      already loads, then mounts the SPA via tools/_app/index.js.
      Routes resolve from `location.hash`:
        spa.html#/boxplot → BoxplotApp
        spa.html#/scatter → ScatterApp
        … and so on for all 10 tools registered in
        tools/_app/tool-registry.ts.

      This file is deleted in phase 5 once index.html itself becomes
      the SPA entry. It exists here only so phase 3 can verify each
      route renders correctly without touching the live iframe shell.
    -->
    <script>
      try {
        var t = localStorage.getItem("dataviz-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <title>Plöttr SPA (phase 3 verification)</title>
    <link rel="stylesheet" href="tools/theme.css" />
    <link rel="stylesheet" href="tools/components.css" />
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: monospace;
        background: var(--page-bg);
        color: var(--text);
        min-height: 100vh;
      }
      /* Topbar styles cribbed from index.html so the in-SPA topbar
         renders correctly during phase 3. Phase 5 lifts these into
         tools/components.css proper. */
      .tool-topbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; }
      .tb-icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
      }
      .tb-icon-btn:hover { border-color: var(--accent-primary); }
      .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    </style>
    <script src="tools/shared.bundle.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="tools/_app/index.js"></script>
  </body>
</html>
