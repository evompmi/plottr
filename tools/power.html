<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        var t = localStorage.getItem("dataviz-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <title>Power Analysis — Plöttr</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='8' cy='22' r='3.5' fill='%23648FFF'/><circle cx='14' cy='12' r='2.5' fill='%23648FFF'/><circle cx='22' cy='18' r='4' fill='%23648FFF'/><circle cx='26' cy='8' r='2.5' fill='%23648FFF'/></svg>"
    />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="components.css" />
    <script src="../vendor/react.production.min.js"></script>
    <script src="../vendor/react-dom.production.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: monospace;
        background: var(--page-bg);
        background-image: radial-gradient(circle, var(--page-bg-dot) 0.8px, transparent 0.8px);
        background-size: 20px 20px;
        color: var(--text);
      }

      /* Mobile-phone layout: stack the left (controls) + right (chart +
         result) columns vertically and scrap the power curve entirely — a
         320-to-600 px viewport has no room for an axis chart with ticks, and
         the result number + parameter tiles are what the user came for
         anyway (sanity-checking stats at a conference). */
      /* Top-row cards share the same flex parent so a single CSS `order`
         rule can reshuffle them per viewport (see @media block below).
         On desktop the question banner wraps onto a second line beneath
         the Test + Solve-for pickers (`flex-basis: 100%` forces wrap). */
      .power-top-test {
        order: 1;
      }
      .power-top-solve {
        order: 2;
      }
      .power-top-desc {
        order: 3;
        flex-basis: 100%;
      }

      @media (max-width: 900px) {
        .power-top-row {
          flex-direction: column !important;
          gap: 10px !important;
        }
        /* Mobile reorder: Test → Question → Solve-for so the descriptor
           sits right under the test picker (read immediately after
           choosing a test) and above the Solve-for toggle. */
        .power-top-desc {
          order: 2 !important;
        }
        .power-top-solve {
          order: 3 !important;
        }
        .power-main-row {
          flex-direction: column !important;
          gap: 10px !important;
          align-items: stretch !important;
        }
        .power-col-left {
          width: 100% !important;
        }
        .power-col-right {
          min-width: 0 !important;
        }
        .power-chart-card {
          display: none !important;
        }
      }
    </style>
    <script src="shared.bundle.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="power.js"></script>
  </body>
</html>
