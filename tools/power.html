<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- BEGIN dv-anti-clickjack -->
    <!--
      Frame-busting against hostile embedders. GitHub Pages can't set
      X-Frame-Options / frame-ancestors, so this inline snippet is the
      only option. Same-origin iframes (landing → tool, embedded demos
      from sibling projects on this Pages origin) render normally;
      cross-origin frames (or no referrer) get replaced with a
      "Open in a top-level tab" link. Closes Tier A #3 from the
      02-05-2026 security audit. Managed by scripts/anti-clickjack-sync.js
      — do not edit by hand; re-run that script after changes.
    -->
    <style id="dv-anti-clickjack">
      html {
        visibility: hidden;
      }
    </style>
    <script>
      (function () {
        function reveal() {
          var s = document.getElementById("dv-anti-clickjack");
          if (s) s.remove();
        }
        try {
          if (window.top === window.self) {
            reveal();
            return;
          }
          var ref = document.referrer;
          if (ref) {
            try {
              if (new URL(ref).origin === window.location.origin) {
                reveal();
                return;
              }
            } catch (e) {}
          }
          if (typeof window.stop === "function") window.stop();
          var loc = window.location.href;
          document.documentElement.innerHTML =
            '<head><meta charset="UTF-8"><title>Open in a top-level tab</title>' +
            "<style>body{font-family:system-ui,sans-serif;padding:32px;margin:0;background:#fff;color:#222;line-height:1.5}a{color:#0066cc}</style>" +
            "</head><body><p>Pl\u00f6ttr is being framed by an unrelated site. " +
            '<a href="' +
            loc +
            '" target="_blank" rel="noopener">Open in a top-level tab</a> instead.</p></body>';
        } catch (e) {}
      })();
    </script>
    <!-- END dv-anti-clickjack -->
    <script>
      try {
        var t = localStorage.getItem("dataviz-theme");
        if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <title>Power Analysis — Plöttr</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='8' cy='22' r='3.5' fill='%23648FFF'/><circle cx='14' cy='12' r='2.5' fill='%23648FFF'/><circle cx='22' cy='18' r='4' fill='%23648FFF'/><circle cx='26' cy='8' r='2.5' fill='%23648FFF'/></svg>"
    />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="components.css" />
    <script
      src="../vendor/react.production.min.js"
      integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
      crossorigin="anonymous"
    ></script>
    <script
      src="../vendor/react-dom.production.min.js"
      integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: monospace;
        background: var(--page-bg);
        background-image: radial-gradient(circle, var(--page-bg-dot) 0.8px, transparent 0.8px);
        background-size: 20px 20px;
        color: var(--text);
      }

      /* Mobile-phone layout: stack the left (controls) + right (chart +
         result) columns vertically and scrap the power curve entirely — a
         320-to-600 px viewport has no room for an axis chart with ticks, and
         the result number + parameter tiles are what the user came for
         anyway (sanity-checking stats at a conference). */
      /* Top-row cards share the same flex parent so a single CSS `order`
         rule can reshuffle them per viewport (see @media block below).
         On desktop the question banner wraps onto a second line beneath
         the Test + Solve-for pickers (`flex-basis: 100%` forces wrap). */
      .power-top-test {
        order: 1;
      }
      .power-top-solve {
        order: 2;
      }
      .power-top-desc {
        order: 3;
        flex-basis: 100%;
      }

      @media (max-width: 900px) {
        .power-top-row {
          flex-direction: column !important;
          gap: 10px !important;
        }
        /* Mobile reorder: Test → Question → Solve-for so the descriptor
           sits right under the test picker (read immediately after
           choosing a test) and above the Solve-for toggle. */
        .power-top-desc {
          order: 2 !important;
        }
        .power-top-solve {
          order: 3 !important;
        }
        .power-main-row {
          flex-direction: column !important;
          gap: 10px !important;
          align-items: stretch !important;
        }
        .power-col-left {
          width: 100% !important;
        }
        .power-col-right {
          min-width: 0 !important;
        }
        .power-chart-card {
          display: none !important;
        }
        /* Hide the R-script download chip on phones — mobile users are
           sanity-checking stats on the go, not authoring reproducible
           R scripts, and the absolutely-positioned chip was bumping
           into the result number on narrow cards anyway. */
        .power-r-dl {
          display: none !important;
        }
      }
    </style>
    <script src="shared.bundle.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script src="power.js"></script>
  </body>
</html>
